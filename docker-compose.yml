services:
  # Command 1: index PDFs into Chroma (one-shot)
  #   docker compose run --rm ingest
  ingest:
    build: .
    env_file:
      - .env
    environment:
      KNOWLEDGE_BASE_PATH: /app/knowledge-base
      CHROMA_PATH: /app/data/chroma
    volumes:
      - ./knowledge-base:/app/knowledge-base
      - ./data:/app/data
    command: ["python", "-m", "rag_kb.ingest"]
    profiles: ["ingest"]

  # Command 2: run the RAG chatbot UI
  #   docker compose up --build chat
  chat:
    build: .
    ports:
      - "7860:7860"
    env_file:
      - .env
    environment:
      KNOWLEDGE_BASE_PATH: /app/knowledge-base
      CHROMA_PATH: /app/data/chroma
      GRADIO_SERVER_NAME: 0.0.0.0
      GRADIO_SERVER_PORT: "7860"
    volumes:
      - ./knowledge-base:/app/knowledge-base
      - ./data:/app/data
    command: ["python", "-m", "rag_kb.app"]
    restart: unless-stopped
